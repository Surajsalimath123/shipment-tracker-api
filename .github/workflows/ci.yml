name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test, coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show versions
        run: |
          java -version
          ./mvnw -version

      - name: Compile
        run: ./mvnw -B -ntp compile

      - name: Run tests with coverage
        run: ./mvnw -B -ntp verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Coverage summary in job output
        if: success()
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            python3 - <<'PY'
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          c = root.find("counter[@type='INSTRUCTION']")
          if c is not None:
              covered = int(c.get('covered'))
              missed = int(c.get('missed'))
              total = covered + missed
              pct = 100.0 * covered / total if total else 0
              print(f'Overall coverage: {pct:.1f}% ({covered}/{total} instructions)')
              with open('coverage-summary.txt', 'w') as f:
                  f.write(f'{pct:.1f}%')
          PY
          fi

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: shipment-tracker-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check the image starts
        run: |
          docker images shipment-tracker-api:ci
          docker inspect shipment-tracker-api:ci > /dev/null
