spring:
  application:
    name: shipment-tracker-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shipment_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    git:
      mode: simple

app:
  jwt:
    # 256-bit base64 secret. OVERRIDE via JWT_SECRET env var in production.
    secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LXJlcGxhY2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: argus-shipment-tracker

  rate-limit:
    enabled: true
    authenticated:
      requests-per-minute: 1000
      burst-capacity: 100
    unauthenticated:
      requests-per-minute: 100
      burst-capacity: 20

  webhook:
    timeout-seconds: 5
    max-retries: 5
    backoff-initial-ms: 1000
    backoff-multiplier: 2.0
    backoff-max-ms: 60000
    pool-core-size: 4
    pool-max-size: 16
    pool-queue-capacity: 1000
    signing-secret: ${WEBHOOK_SIGNING_SECRET:dev-only-webhook-signing-secret-change-me}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.argus.shipmenttracker: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///test_shipment_tracker
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

logging:
  level:
    com.argus.shipmenttracker: DEBUG
    org.testcontainers: INFO
